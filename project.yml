name: Calibrate
options:
  bundleIdPrefix: com.calibrate
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""

targets:
  Calibrate:
    type: application
    platform: iOS
    sources:
      - path: Calibrate
        excludes:
          - "**/*.xcassets/*/Contents.json"
    resources:
      - path: Calibrate/Resources/Assets.xcassets
      - path: Calibrate/Resources/seed_questions.json
        optional: true
    settings:
      base:
        INFOPLIST_FILE: Calibrate/Info.plist
        CODE_SIGN_ENTITLEMENTS: Calibrate/Calibrate.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.calibrate.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Calibrate/Calibrate.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.calibrate.app
        com.apple.developer.icloud-services:
          - CloudKit

  CalibrateTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CalibrateTests
    dependencies:
      - target: Calibrate
    settings:
      base:
        INFOPLIST_FILE: CalibrateTests/Info.plist
